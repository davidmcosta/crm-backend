name: order_management
description: Sistema de gestão de encomendas multiplataforma.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  dio: ^5.4.3+1
  image_picker: ^1.1.2
  flutter_secure_storage: ^9.2.2
  go_router: ^14.2.0
  cupertino_icons: ^1.0.6
  intl: ^0.19.0
  rename: ^3.1.0
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  windows:
    generate: true
  image_path: assets/images/logo_icon.png

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo_horizontal.png
    - assets/images/logo_icon.png